services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  api:
    image: guilhermecristaldodev/meat-control-api:latest
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
    depends_on:
      - db